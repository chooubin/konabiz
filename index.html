<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코나비즈 Mock DB Viewer</title>
<style>
:root{--primary:#0028b6;--primary-light:#e8eeff;--bg:#f5f7fa;--card:#fff;--border:#e2e8f0;--text:#1a202c;--text-sub:#64748b;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
header{background:linear-gradient(135deg,#0028b6 0%,#1e40af 50%,#3b82f6 100%);color:#fff;padding:24px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(0,40,182,.25)}
header .logo{font-size:28px;font-weight:800;letter-spacing:-.5px}
header .sub{font-size:14px;opacity:.8;margin-left:auto}
.stats-bar{display:flex;gap:12px;padding:16px 32px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto}
.stat-chip{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:var(--primary-light);font-size:13px;font-weight:600;white-space:nowrap;color:var(--primary)}
.stat-chip .n{font-size:16px;font-weight:800}
.container{max-width:1400px;margin:0 auto;padding:20px 32px}
.tabs{display:flex;gap:4px;background:#fff;padding:8px;border-radius:var(--radius);margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;border:none;background:transparent;color:var(--text-sub)}
.tab:hover{background:var(--primary-light);color:var(--primary)}
.tab.active{background:var(--primary);color:#fff}
.search-bar{margin-bottom:16px;display:flex;gap:8px}
.search-bar input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:8px;font-size:14px;transition:border-color .2s}
.search-bar input:focus{outline:none;border-color:var(--primary)}
.search-bar .count{display:flex;align-items:center;font-size:13px;color:var(--text-sub);white-space:nowrap;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.table-wrap{overflow-x:auto;max-height:70vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{background:#f8fafc;padding:12px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border);white-space:nowrap;color:var(--text-sub);font-size:12px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none}
th:hover{background:var(--primary-light)}
th .sort-icon{margin-left:4px;opacity:.4;font-size:10px}
th.sorted .sort-icon{opacity:1;color:var(--primary)}
td{padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:#f0f4ff}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}
.company-selector{margin-bottom:16px;display:flex;gap:8px;align-items:center}
.company-selector label{font-weight:700;font-size:14px;color:var(--text-sub)}
.company-selector select{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-weight:600}
.empty{text-align:center;padding:60px;color:var(--text-sub)}
.amount{font-family:'JetBrains Mono',monospace;text-align:right;font-variant-numeric:tabular-nums}
footer{text-align:center;padding:24px;color:var(--text-sub);font-size:12px}
@media(max-width:768px){
  .container{padding:12px}
  header{padding:16px}
  .stats-bar{padding:12px 16px}
  .tabs{gap:2px;padding:4px}
  .tab{padding:8px 12px;font-size:12px}
}
</style>
</head>
<body>
<header>
  <div class="logo">코나비즈</div>
  <div>Mock DB Interactive Viewer</div>
  <div class="sub" id="metaInfo"></div>
</header>
<div class="stats-bar" id="statsBar"></div>
<div class="container">
  <div class="company-selector">
    <label>기업 선택:</label>
    <select id="companyFilter"><option value="">전체</option></select>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="테이블 내 검색... (모든 컬럼)">
    <div class="count"><span id="rowCount">0</span>&nbsp;건</div>
  </div>
  <div class="card">
    <div class="table-wrap" id="tableWrap">
      <div class="empty">데이터 로딩 중...</div>
    </div>
  </div>
</div>
<footer>HND-20260408-008 소스코드 기반 Mock DB · Generated by 코나비즈 AI 에이전트 팀</footer>

<script>
let DB = {};
let currentTab = '';
let currentSort = { col: '', asc: true };
let currentCompany = '';

const TABLE_CONFIG = {
  companies: { label: '기업정보', icon: '🏢', companyKey: 'wptlEntpNo' },
  products: { label: '운영상품', icon: '📦', companyKey: 'wptlEntpNo' },
  employees: { label: '임직원', icon: '👤', companyKey: 'wptlEntpNo' },
  cards: { label: '카드관리', icon: '💳', companyKey: 'wptlEntpNo' },
  transactions: { label: '지급/회수', icon: '💰', companyKey: 'wptlEntpNo' },
  regular_transactions: { label: '정기지급', icon: '📅', companyKey: null },
  card_usages: { label: '이용내역', icon: '🛒', companyKey: 'wptlEntpNo' },
  payment_failures: { label: '결제실패', icon: '⚠️', companyKey: null },
  deposits: { label: '예치금', icon: '🏦', companyKey: 'wptlPrdNo' },
  notices: { label: '공지사항', icon: '📢', companyKey: null },
  dashboard_summary: { label: '대시보드', icon: '📊', companyKey: 'wptlEntpNo' }
};

const STATUS_BADGES = {
  '재직': 'green', '완료': 'green', 'ACTIVE': 'green', 'APPROVED': 'green', 'Y': 'green',
  '퇴사': 'red', '실패': 'red', '취소': 'red', 'SUSPENDED': 'red', 'BLOCKED': 'red',
  '휴직': 'yellow', '대기': 'yellow', 'PENDING': 'yellow',
  '수습': 'blue', 'N': 'gray'
};

function badge(val) {
  const s = String(val);
  const color = STATUS_BADGES[s];
  return color ? `<span class="badge badge-${color}">${s}</span>` : s;
}

function fmtCell(key, val) {
  if (val === null || val === undefined) return '-';
  const s = String(val);
  if (['wptlEntpWkinStNm','dsbRtrvlStNm','dsbStTypeNm','cardStatus','appConnectYn','crdDsbNm','respNm','topExpsYn','smsNfctYnNm'].includes(key)) return badge(s);
  if (key.toLowerCase().includes('amount') || key === 'pointAmt' || key === 'prdSllUprcCm' || key === 'totalAmount' || key === 'attempted_amount') {
    const n = Number(s.replace(/,/g,''));
    if (!isNaN(n)) return `<span class="amount">${n.toLocaleString('ko-KR')}</span>`;
  }
  return s.length > 60 ? s.substring(0,57) + '...' : s;
}

async function loadData() {
  const res = await fetch('data.json');
  DB = await res.json();
  
  document.getElementById('metaInfo').textContent = `v${DB.meta?.version || '?'} · Task ${DB.meta?.task_id || '?'}`;
  
  // Stats
  const stats = [];
  for (const [k, cfg] of Object.entries(TABLE_CONFIG)) {
    if (DB[k]) stats.push(`<div class="stat-chip">${cfg.icon} ${cfg.label} <span class="n">${Array.isArray(DB[k]) ? DB[k].length : '—'}</span></div>`);
  }
  document.getElementById('statsBar').innerHTML = stats.join('');
  
  // Company filter
  const sel = document.getElementById('companyFilter');
  (DB.companies || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.wptlEntpNo;
    opt.textContent = `${c.entpNm} (${c.wptlEntpNo})`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { currentCompany = sel.value; renderTable(); });
  
  // Tabs
  const tabsEl = document.getElementById('tabs');
  let first = true;
  for (const [k, cfg] of Object.entries(TABLE_CONFIG)) {
    if (!DB[k] || !Array.isArray(DB[k]) || DB[k].length === 0) continue;
    const btn = document.createElement('button');
    btn.className = 'tab' + (first ? ' active' : '');
    btn.textContent = `${cfg.icon} ${cfg.label}`;
    btn.dataset.key = k;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentTab = k;
      currentSort = { col: '', asc: true };
      renderTable();
    });
    tabsEl.appendChild(btn);
    if (first) { currentTab = k; first = false; }
  }
  
  document.getElementById('searchInput').addEventListener('input', renderTable);
  renderTable();
}

function getFilteredData() {
  let data = DB[currentTab] || [];
  
  // Company filter
  if (currentCompany) {
    const cfg = TABLE_CONFIG[currentTab];
    if (cfg?.companyKey) {
      data = data.filter(r => {
        const v = r[cfg.companyKey];
        return v !== undefined && String(v) === currentCompany;
      });
    }
    // For tables linked via wptlPrdNo, match products of that company
    if (cfg?.companyKey === 'wptlPrdNo' && DB.products) {
      const prdNos = new Set(DB.products.filter(p => String(p.wptlEntpNo) === currentCompany).map(p => p.wptlPrdNo));
      data = data.filter(r => prdNos.has(r.wptlPrdNo));
    }
  }
  
  // Search
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q) {
    data = data.filter(r => Object.values(r).some(v => v !== null && String(v).toLowerCase().includes(q)));
  }
  
  // Sort
  if (currentSort.col) {
    data = [...data].sort((a, b) => {
      const va = a[currentSort.col] ?? '';
      const vb = b[currentSort.col] ?? '';
      const na = Number(String(va).replace(/,/g,''));
      const nb = Number(String(vb).replace(/,/g,''));
      if (!isNaN(na) && !isNaN(nb)) return currentSort.asc ? na - nb : nb - na;
      return currentSort.asc ? String(va).localeCompare(String(vb), 'ko') : String(vb).localeCompare(String(va), 'ko');
    });
  }
  
  return data;
}

function renderTable() {
  const data = getFilteredData();
  document.getElementById('rowCount').textContent = data.length;
  
  if (data.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">데이터가 없습니다</div>';
    return;
  }
  
  // Skip internal/masking keys for cleaner display
  const skipKeys = new Set(['unmaskStfNm','unmaskCdno','maskStfNm','maskCdno','unmaskVtlAcno']);
  const keys = Object.keys(data[0]).filter(k => !skipKeys.has(k));
  
  let html = '<table><thead><tr>';
  html += '<th style="width:60px">#</th>';
  keys.forEach(k => {
    const sorted = currentSort.col === k;
    const arrow = sorted ? (currentSort.asc ? '▲' : '▼') : '⇅';
    html += `<th class="${sorted ? 'sorted' : ''}" data-col="${k}">${k} <span class="sort-icon">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  
  const limit = Math.min(data.length, 500);
  for (let i = 0; i < limit; i++) {
    html += '<tr>';
    html += `<td style="color:var(--text-sub);font-size:12px">${i + 1}</td>`;
    keys.forEach(k => { html += `<td>${fmtCell(k, data[i][k])}</td>`; });
    html += '</tr>';
  }
  if (data.length > 500) html += `<tr><td colspan="${keys.length+1}" style="text-align:center;color:var(--text-sub);padding:20px">... ${data.length - 500}건 추가 (총 ${data.length}건)</td></tr>`;
  html += '</tbody></table>';
  
  document.getElementById('tableWrap').innerHTML = html;
  
  // Sort click handlers
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (currentSort.col === col) currentSort.asc = !currentSort.asc;
      else { currentSort.col = col; currentSort.asc = true; }
      renderTable();
    });
  });
}

loadData();
</script>
</body>
</html>
